<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta de Lixo</title>
    <script src="js/script.js" type="module" defer
    ></script>
</head>
<body>
    <div id="geral"></div>
    <h3>Insira os Seguintes Dados:</h3>
    <form id="dados-empresa">
        <div>
            <label for="nome">Nome da Empresa</label> <br>
            <input type="text" id="nome" required>
            <br>
            <label for="lixo">Quantidade de Lixo Coletado</label> <br>
            <input type="text" id="lixo" required>
            <br><br>
            <button type="submit">Cadastrar Empresa</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
    
</body>
</html>
