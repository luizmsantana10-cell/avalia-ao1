<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta de Lixo</title>
    <script src="/js/script_Lixo.js" defer></script>
</head>
<body>
    <div id="geral"></div>
    <h3>Insira os Seguintes Dados:</h3>
    <form id="dados-empresa">
        <div>
            <label for="nome">Nome da Empresa</label> <br>
            <input type="text" id="nome" name="nome" required>
            <br>
            <label for="lixo">Quantidade de Lixo Coletado</label> <br>
            <input type="text" id="lixo" name="lixo" required>
            <br><br>
            <button type="submit">Cadastrar Empresa</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
    <br><hr><br>

    <h4>Empresa Cadastrada</h4>
    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr>
                <th>Nome da Empresa: </th>
                <th>Quantidade coletada: </th>
                <th>Valor a Receber: </th>
                <th>Premiação: </th>
                <th>Valor Final: </th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
</body>
</html>
